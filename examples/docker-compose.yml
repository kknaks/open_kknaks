services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 3

  worker:
    build:
      context: ..
      dockerfile: examples/Dockerfile.worker
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - ..:/project:ro

  app:
    build:
      context: ..
      dockerfile: examples/Dockerfile.app
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    ports:
      - "8000:8000"

volumes:
  redis_data:
