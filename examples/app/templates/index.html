<!DOCTYPE html>
<html>
<head>
    <title>open_kknaks Example</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: monospace; max-width: 900px; margin: 40px auto; padding: 0 16px; }
        h1 { margin-bottom: 8px; }

        #status-bar {
            background: #222; color: #ccc; padding: 12px 16px;
            border-radius: 6px; margin-bottom: 20px; font-size: 13px;
            display: flex; gap: 24px; flex-wrap: wrap;
        }
        .badge { padding: 2px 8px; border-radius: 3px; font-weight: bold; }
        .badge-ok { background: #1a3a1a; color: #4f4; }
        .badge-err { background: #3a1a1a; color: #f44; }
        .badge-info { background: #1a2a3a; color: #4af; }

        textarea { width: 100%; height: 80px; font-family: monospace; font-size: 14px; }
        #output {
            background: #1a1a2e; color: #0f0; padding: 16px;
            min-height: 250px; max-height: 500px;
            white-space: pre-wrap; overflow-y: auto;
            border-radius: 6px; font-size: 13px;
        }
        button { padding: 8px 16px; margin: 8px 4px 8px 0; cursor: pointer; font-family: monospace; }
        .task-status { color: #888; font-size: 12px; }
    </style>
</head>
<body>
    <h1>open_kknaks</h1>
    <p style="color:#888; margin-top:0;">PTY-based Claude Code task queue</p>

    <div id="status-bar">
        <span>Redis: <span id="redis-badge" class="badge badge-err">checking...</span></span>
        <span>Claude: <span id="claude-badge" class="badge badge-err">checking...</span></span>
        <span>Workers: <span id="worker-badge" class="badge badge-info">-</span></span>
        <span>Queues: <span id="queues-info" style="color:#aaa">-</span></span>
    </div>
    <div id="worker-detail" style="font-size:12px; color:#888; margin-bottom:16px;"></div>

    <textarea id="prompt" placeholder="Enter your prompt..."></textarea>
    <br>
    <button onclick="submitStream()">Submit (Streaming)</button>
    <button onclick="submitWait()">Submit (Wait)</button>
    <span id="taskStatus" class="task-status"></span>

    <div id="output"></div>

    <script>
    const output = document.getElementById('output');
    const taskStatus = document.getElementById('taskStatus');

    // Poll health every 5s
    async function checkHealth() {
        try {
            const res = await fetch('/health');
            const h = await res.json();

            const redisBadge = document.getElementById('redis-badge');
            redisBadge.textContent = h.redis;
            redisBadge.className = 'badge ' + (h.redis === 'connected' ? 'badge-ok' : 'badge-err');

            const claudeBadge = document.getElementById('claude-badge');
            claudeBadge.textContent = h.claude;
            claudeBadge.className = 'badge ' + (h.claude === 'connected' ? 'badge-ok' : h.claude === 'partial' ? 'badge-info' : 'badge-err');

            const workerBadge = document.getElementById('worker-badge');
            workerBadge.textContent = h.worker_count;
            workerBadge.className = 'badge ' + (h.worker_count > 0 ? 'badge-ok' : 'badge-err');

            const qInfo = Object.entries(h.queues).map(([k,v]) => `${k}:${v}`).join('  ');
            document.getElementById('queues-info').textContent = qInfo;

            // Worker detail
            const detail = h.workers.map(w =>
                `${w.id}: claude=${w.claude} ${w.claude_version} [${w.queues.join(',')}]`
            ).join('<br>');
            document.getElementById('worker-detail').innerHTML = detail;
        } catch {
            document.getElementById('redis-badge').textContent = 'error';
            document.getElementById('redis-badge').className = 'badge badge-err';
        }
    }
    checkHealth();
    setInterval(checkHealth, 5000);

    async function submitStream() {
        const prompt = document.getElementById('prompt').value;
        if (!prompt.trim()) return;
        output.textContent = '';
        taskStatus.textContent = 'submitting...';

        const res = await fetch('/submit', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({prompt}),
        });
        const {task_id} = await res.json();
        taskStatus.textContent = `${task_id} - streaming...`;

        const evtSource = new EventSource(`/stream/${task_id}`);
        evtSource.addEventListener('text', e => {
            output.textContent += e.data;
            output.scrollTop = output.scrollHeight;
        });
        evtSource.addEventListener('retry', e => {
            output.textContent += `\n[RETRY] ${e.data}\n`;
        });
        evtSource.addEventListener('done', () => {
            taskStatus.textContent = `${task_id} - done`;
            evtSource.close();
            checkHealth();
        });
        evtSource.onerror = () => {
            taskStatus.textContent = `${task_id} - connection closed`;
            evtSource.close();
        };
    }

    async function submitWait() {
        const prompt = document.getElementById('prompt').value;
        if (!prompt.trim()) return;
        output.textContent = '';
        taskStatus.textContent = 'submitting...';

        const res = await fetch('/submit', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({prompt}),
        });
        const {task_id} = await res.json();
        taskStatus.textContent = `${task_id} - waiting...`;

        const resultRes = await fetch(`/result/${task_id}`);
        const result = await resultRes.json();
        output.textContent = result.result || result.error || 'No result';
        taskStatus.textContent = `${task_id} - ${result.status}`;
        checkHealth();
    }
    </script>
</body>
</html>
